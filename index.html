<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIMC Management Report Portal</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/7/79/Flag_of_Nigeria.svg" type="image/svg+xml">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #080b11;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #ffffff;
        }
        
        /* Full-screen Iframe */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Styling for the loading state / fallback screen */
        .loading-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #080b11;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: -1; /* Sits behind the iframe once it loads */
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 204, 136, 0.1);
            border-top-color: #00cc88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .logo {
            width: 80px;
            margin-bottom: 1rem;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
            padding: 0 1rem;
        }
    </style>
</head>
<body>

    <!-- Loading screen displayed while the tunnel loads -->
    <div class="loading-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/Flag_of_Nigeria.svg" alt="NIMC Logo" class="logo">
        <div class="spinner"></div>
        <div class="title">NIMC Management Report Portal</div>
        <div class="subtitle">Connecting securely to the local server. If this page hangs, the server may be offline.</div>
    </div>

    <!-- 
      DIRECTIONS FOR UPDATE:
      Whenever you restart your PC or the tunnel, copy the new Flask Portal Tunnel URL
      and paste it into the 'src' attribute below (replacing the URL inside the quotes).
    -->
    <iframe 
        src="https://careful-ascii-directive-adjustments.trycloudflare.com" 
        allowtransparency>
    </iframe>

</body>
</html>
